<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skim — Markdown Viewer &amp; Reader</title>
<meta name="description" content="Read what your AI wrote, instantly. Skim renders .md files beautifully in your browser — live reload, math, diagrams, zero data collection. Free and open source.">
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center; font:18px/1.6 system-ui,sans-serif; background:#0d1017; color:#e8eaf0; }
  main { text-align:center; padding:40px 24px; max-width:640px; }
  .lines { display:inline-flex; flex-direction:column; gap:9px; margin-bottom:28px; }
  .lines span { height:10px; border-radius:5px; display:block; }
  .l1 { width:120px; background:#e8eaf0; } .l2 { width:84px; background:#7aa2ff; } .l3 { width:51px; background:#4a5164; }
  h1 { font-size:34px; margin:0 0 10px; } p { color:#9aa3b8; margin:0 0 26px; }
  a.btn { display:inline-block; background:#7aa2ff; color:#0d1017; font-weight:600; text-decoration:none; padding:12px 26px; border-radius:999px; }
  a.gh { color:#7aa2ff; text-decoration:none; display:block; margin-top:18px; }
</style>
</head>
<body>
<main>
  <div class="lines" aria-hidden="true"><span class="l1"></span><span class="l2"></span><span class="l3"></span></div>
  <h1>Skim</h1>
  <p>The markdown viewer for the AI era. Read what your agent wrote — instantly, beautifully, privately.<br>Chrome extension launching soon.</p>
  <a class="btn" href="https://github.com/skim-md/skim">View on GitHub</a>
  <a class="gh" href="https://github.com/skim-md/skim#install-unpacked-for-development">Install the preview (load unpacked)</a>
</main>
</body>
</html>
